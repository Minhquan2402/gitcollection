<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Hello Docker</title>
    <style>
        :root {
            color-scheme: light;
            --bg: linear-gradient(135deg, #f5efe6 0%, #dce8f2 100%);
            --card: rgba(255, 255, 255, 0.88);
            --text: #1f2a37;
            --accent: #0f766e;
            --accent-soft: #d1fae5;
            --shadow: 0 24px 60px rgba(31, 42, 55, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: var(--bg);
            font-family: "Segoe UI", "Helvetica Neue", sans-serif;
            color: var(--text);
        }

        .card {
            width: min(720px, 100%);
            padding: 48px;
            border-radius: 28px;
            background: var(--card);
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
        }

        .badge {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        h1 {
            margin: 18px 0 12px;
            font-size: clamp(2.4rem, 6vw, 4.8rem);
            line-height: 1;
        }

        p {
            margin: 0;
            font-size: 1.1rem;
            line-height: 1.7;
            max-width: 56ch;
        }

        .footer {
            margin-top: 28px;
            font-size: 0.95rem;
            color: #4b5563;
        }

        @media (max-width: 640px) {
            .card {
                padding: 32px 24px;
                border-radius: 22px;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <span class="badge">Spring Boot</span>
        <h1 th:text="${title}">Hello Docker</h1>
        <p th:text="${message}">Chao mung ban den voi trang Hello Docker</p>
        <p class="footer" th:text="${description}">Trang nay duoc phuc vu bang Spring Boot va Thymeleaf.</p>
    </main>
</body>
</html>
