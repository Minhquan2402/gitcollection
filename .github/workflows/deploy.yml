name: CI/CD Build and Push to Docker Hub

# Chạy workflow khi có hành động push vào nhánh main
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code từ GitHub về máy ảo của Github Actions
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Đăng nhập vào Docker Hub sử dụng Access Token
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Thiết lập Docker Buildx (hỗ trợ build nâng cao)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Build Image và Push lên Docker Hub với Tags
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Đã sửa lại DOCKERHUB_USERNAME thành DOCKER_USERNAME cho đồng bộ
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/minhquanjava:latest
            ${{ secrets.DOCKER_USERNAME }}/minhquanjava:${{ github.sha }}

      # 5. Triển khai lên DevOps Classroom
      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="${{ secrets.DOCKER_USERNAME }}/minhquanjava"
          CONTAINER_PORT=80
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=3&container_port=$CONTAINER_PORT&strict_container_port=0")
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
