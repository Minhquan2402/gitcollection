name: quanvo2402/minhquanjava

# Kích hoạt workflow khi có code mới được push lên nhánh main
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Lấy mã nguồn từ repository về môi trường chạy (runner)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Đăng nhập vào Docker Hub sử dụng Secrets đã thiết lập
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Cài đặt Docker Buildx (công cụ hỗ trợ build image tối ưu)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Build Docker Image từ Dockerfile và Push lên Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Gắn tags cho image. Thay 'ten-image-cua-ban' bằng tên bạn muốn.
          # Ở đây tự động tạo 2 tag: 'latest' và tag theo mã SHA của commit để dễ quản lý version.
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/quanvo2402/minhquanjava:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/quanvo2402/minhquanjava:${{ github.sha }}
